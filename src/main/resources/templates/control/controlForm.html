<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/form :: html}">
<head>
    <th:block th:with="pageTitle='Edit Control'"></th:block>
</head>
<body>

<!-- Relationship Modal -->
<div th:fragment="form">
    <script>
        function getNextCoverageIndex() {
            // Select all elements where the ID starts with "coverage-"
            const inputs = document.querySelectorAll('[id^="coverage-"]');
            let maxIndex = -1;

            inputs.forEach(input => {
                // Match the digits following "coverage-"
                const match = input.id.match(/coverage-(\d+)/);
                if (match) {
                    const idx = parseInt(match[1], 10);
                    if (idx > maxIndex) {
                        maxIndex = idx;
                    }
                }
            });

            // Returns the next available index
            return maxIndex + 1;
        }

        // Cost definitions (for UI niceties)
        const costMessages = {
            0: "Negligible: Minimal resource requirements; zero impact on existing workflows or user productivity.",
            1: "Low: Minor administrative effort and/or low capital expenditure with negligible operational friction.",
            2: "Minor: Small-scale investment, manageable impact on team bandwidth and routine operations.",
            3: "Moderate: Standard project investment, requires dedicated resource allocation and moderate change management to address user friction.",
            4: "High: Significant capital outlay; high opportunity cost and/or substantial disruption to established business processes.",
            5: "Critical: Major strategic investment, fundamental operational shifts causing high friction and extensive diversion of specialized personnel."
        };

        function updateCostIndex(val) {
            document.getElementById('costIndexValue').innerText = val;
            document.getElementById('costIndexDescription').innerText = costMessages[val];
        }

        // Initialize the description helper on page load
        document.addEventListener("DOMContentLoaded", function() {
            const slider = document.getElementById('controlCostIndex');
            updateCostIndex(slider.value);
        });
    </script>
    <div class="modal fade" id="formModal" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" id="modalHolder">
                Nope.
            </div>
        </div>
    </div>
    <form th:action="@{/control/edit}" th:object="${controlForm}" method="post">
        <legend>Edit Topic</legend>
        <h5>Basic information</h5>
        <input type="hidden" th:field="*{controlId}"/>
        <div class="mb-3">
            <label for="controlCode" class="form-label">Control Code</label>
            <input type="text" class="form-control" id="controlCode" aria-describedby="controlCodeHelp" th:value="*{controlCode}" disabled/>
            <div id="controlCodeHelp" class="form-text">Control code is generated automatically.</div>
        </div>
        <div class="mb-3">
            <label for="controlName" class="form-label">Control Name</label>
            <input type="text" class="form-control" id="controlName" th:field="*{controlName}"/>
        </div>
        <div class="mb-3">
            <label for="controlDescription" class="form-label">Control Description</label>
            <textarea id="controlDescription" class="form-control" th:field="*{controlDescription}">
            </textarea>
        </div>
        <div class="mb-3">
            <label for="controlCostIndex" class="form-label">
                Cost Index: <span id="costIndexValue" class="fw-bold">3</span>
            </label>

            <input type="range"
                   class="form-range"
                   min="0"
                   max="5"
                   step="1"
                   id="controlCostIndex"
                   th:field="*{controlCostIndex}"
                   th:value="*{controlCostIndex} ?: 3"
                   oninput="updateCostIndex(this.value)">

            <div id="costIndexDescription" class="form-text text-muted fw-medium">
                Medium: Balanced resource and budget requirements.
            </div>
        </div>
        <div class="mb-3">
            <label for="controlTopic" class="form-label">Topic</label>
            <select id="controlTopic" class="form-control" th:field="*{topic}">
                <option th:each="topic : ${topics}" th:value="${topic.id}" th:text="${topic.code} + '-' +${topic.name}"></option>
            </select>
        </div>
        <hr>
        <h5>References</h5>
        <div id="referencesContainer" class="container mb-3">
            <div th:each="ref : *{references}" class="input-group mb-2 reference-row">
                <input type="text"
                       name="references"
                       class="form-control"
                       th:value="${ref}"
                       placeholder="e.g., https://mitre-attack.github.io/...">
                <button type="button"
                        class="btn btn-outline-danger"
                        hx-on:click="this.closest('.reference-row').remove()">
                    Remove
                </button>
            </div>
        </div>

        <button type="button"
                class="btn btn-sm btn-secondary"
                hx-get="/control/fragments/reference-row"
                hx-target="#referencesContainer"
                hx-swap="beforeend">
            Add Reference
        </button>
        <hr>
        <h5>Technique Coverage</h5>
        <div id="relationshipListContainer">
            <button type="button"
                    th:hx-get="@{/techniqueCoverage/add}"
                    hx-target="#modalHolder"
                    hx-swap="innerHTML"
                    hx-vals='js:{arrayLength: getNextCoverageIndex()}'
                    class="btn btn-sm btn-secondary"
                    data-bs-toggle="modal"
                    data-bs-target="#formModal">
            Add Technique Coverage
            </button>
            <div id="coverageList">
                <div th:each="coverage, iter : *{defaultTechniqueCoverage}">
                    <div th:replace="~{fragments/techniqueCoverage :: techniqueCoverageRow(coverage=${coverage}, index=${iter.index})}"></div>
                </div>
            </div>
        </div>
        <hr>
        <div>
            <button class="btn btn-primary" type="submit">Submit</button>
        </div>
    </form>
</div>
<script>
    function getNextCoverageIndex() {
        // Select all elements where the ID starts with "coverage-"
        const inputs = document.querySelectorAll('[id^="coverage-"]');
        let maxIndex = -1;

        inputs.forEach(input => {
            // Match the digits following "coverage-"
            const match = input.id.match(/coverage-(\d+)/);

            if (match) {
                const idx = parseInt(match[1], 10);
                if (idx > maxIndex) {
                    maxIndex = idx;
                }
            }
        });

        // Returns the next available index
        return maxIndex + 1;
    }
</script>
</body>
</html>
