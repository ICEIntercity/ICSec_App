<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/form :: html}">
<head>
    <th:block th:with="pageTitle='Edit Control'"></th:block>
</head>
<body>

<div th:fragment="form">
    <script>
        /**
         * Generalised index finder for dynamic lists
         * @param prefix The ID prefix to search for (e.g., 'coverage-', 'rel-dependencies-')
         */
        function getNextIndex(prefix) {
            const inputs = document.querySelectorAll(`[id^="${prefix}"]`);
            let maxIndex = -1;

            inputs.forEach(input => {
                const regex = new RegExp(`${prefix}(\\d+)`);
                const match = input.id.match(regex);
                if (match) {
                    const idx = parseInt(match[1], 10);
                    if (idx > maxIndex) {
                        maxIndex = idx;
                    }
                }
            });
            return maxIndex + 1;
        }

        const costMessages = {
            0: "Negligible: Minimal resource requirements; zero impact on existing workflows or user productivity.",
            1: "Low: Minor administrative effort and/or low capital expenditure with negligible operational friction.",
            2: "Minor: Small-scale investment, manageable impact on team bandwidth and routine operations.",
            3: "Moderate: Standard project investment, requires dedicated resource allocation and moderate change management to address user friction.",
            4: "High: Significant capital outlay; high opportunity cost and/or substantial disruption to established business processes.",
            5: "Critical: Major strategic investment, fundamental operational shifts causing high friction and extensive diversion of specialized personnel."
        };

        function updateCostIndex(val) {
            document.getElementById('costIndexValue').innerText = val;
            document.getElementById('costIndexDescription').innerText = costMessages[val];
        }

        document.addEventListener("DOMContentLoaded", function() {
            const slider = document.getElementById('controlCostIndex');
            updateCostIndex(slider.value);
        });

        document.addEventListener("DOMContentLoaded", function() {
            const formModal = document.getElementById('formModal');
            formModal.addEventListener('hidden.bs.modal', function () {
                document.getElementById('modalHolder').innerHTML = '';
            });
        });
    </script>

    <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog" id="modalHolder">
        </div>
    </div>
    <div class="modal fade" id="aiModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-80" id="aiModalHolder">
        </div>
    </div>

    <form th:action="@{/control/edit}" th:object="${controlForm}" method="post">
        <legend>Edit Control</legend>

        <h5>Basic information</h5>
        <input type="hidden" th:field="*{controlId}"/>

        <div class="mb-3">
            <label for="controlCode" class="form-label">Control Code</label>
            <input type="text" class="form-control" id="controlCode" th:value="*{controlCode}" disabled/>
        </div>

        <div class="mb-3">
            <label for="controlName" class="form-label">Control Name</label>
            <input type="text" class="form-control" id="controlName" th:field="*{controlName}"/>
        </div>

        <div class="mb-3">
            <label for="controlDescription" class="form-label">Control Description</label>
            <textarea id="controlDescription" class="form-control" th:field="*{controlDescription}"></textarea>
        </div>

        <div class="mb-3">
            <label for="controlCostIndex" class="form-label">
                Cost Index: <span id="costIndexValue" class="fw-bold">3</span>
            </label>
            <input type="range" class="form-range" min="0" max="5" step="1" id="controlCostIndex"
                   th:field="*{controlCostIndex}" oninput="updateCostIndex(this.value)">
            <div id="costIndexDescription" class="form-text text-muted fw-medium"></div>
        </div>

        <div class="mb-3">
            <label for="controlTopic" class="form-label">Topic</label>
            <select id="controlTopic" class="form-control" th:field="*{topic}">
                <option th:each="topic : ${topics}" th:value="${topic.id}" th:text="${topic.code} + '-' +${topic.name}"></option>
            </select>
        </div>

        <hr>
        <h5>References</h5>
        <div id="referencesContainer" class="container mb-3">
            <div th:each="ref : *{references}" class="input-group mb-2 reference-row">
                <input type="text" name="references" class="form-control" th:value="${ref}">
                <button type="button" class="btn btn-outline-danger" hx-on:click="this.closest('.reference-row').remove()">Remove</button>
            </div>
        </div>
        <button type="button" class="btn btn-sm btn-secondary" hx-get="/control/fragments/reference-row" hx-target="#referencesContainer" hx-swap="beforeend">
            Add Reference
        </button>

        <hr>
        <h5>Technique Coverage</h5>
        <div id="coverageContainer">
            <button type="button"
                    th:hx-get="@{/techniqueCoverage/add}"
                    hx-target="#modalHolder"
                    hx-vals='js:{arrayLength: getNextIndex("coverage-")}'
                    class="btn btn-sm btn-secondary mb-2"
                    data-bs-toggle="modal"
                    data-bs-target="#formModal">
                Add Technique Coverage
            </button>

            <!-- AI button -->
            <button type="button"
                    class="btn btn-sm btn-outline-info mb-2"
                    th:hx-post="@{/ai/test-render}"
                    hx-ext="json-enc"
                    hx-vals='js:{name: document.getElementById("controlName").value, description: document.getElementById("controlDescription").value}'
                    hx-target="#aiModalHolder"
                    data-bs-toggle="modal"
                    data-bs-target="#aiModal"
                    hx-on::before-request="document.getElementById('aiModalHolder').innerHTML = document.getElementById('aiLoadingTemplate').innerHTML">
                <i class="bi bi-robot"></i> Generate coverage using AI
            </button>

            <div id="coverageList">
                <div th:each="coverage, iter : *{defaultTechniqueCoverage}">
                    <div th:replace="~{fragments/techniqueCoverage :: techniqueCoverageRow(coverage=${coverage}, index=${iter.index})}"></div>
                </div>
            </div>
            <div th:replace="~{fragments/ai :: aiLoadingTemplate}"></div>
        </div>
        <hr>
        <h5>Relationships</h5>
        <div id="relationshipContainer">
            <button type="button"
                    th:hx-get="@{/controlRelationship/add}"
                    hx-target="#modalHolder"
                    hx-vals='js:{arrayLength: getNextIndex("rel-outgoing-")}'
                    class="btn btn-sm btn-outline-primary mb-2"
                    data-bs-toggle="modal"
                    data-bs-target="#formModal">
                <i class="bi bi-plus-circle"></i> Add Relationship
            </button>

            <div id="relationshipList">
                <th:block th:each="rel, iter : *{outgoingRelationships}">
                    <div th:replace="~{fragments/controlRelationship :: controlRelationshipRow(controlRelationship=${rel}, index=${iter.index}, listName='outgoingRelationships')}"></div>
                </th:block>
            </div>
        </div>
        <hr>
        <div class="mt-4">
            <button class="btn btn-primary btn-lg" type="submit">Save Control</button>
        </div>
    </form>
</div>

</body>
</html>
