<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: html}">
<head>
  <th:block th:with="pageTitle='Control'"></th:block>
  <title>Control</title>
</head>
<body>
<div th:fragment="content">
  <div class="my-2 container">
    <a class="btn btn-dark mg" th:href="@{/control/all}">< Back</a>
    <a class="btn btn-primary mg" th:href="@{/control/edit/{id}(id = ${control.getId()})}">Edit control</a>
    <button class="btn btn-danger mg"
            th:attr="hx-delete=@{/control/delete/{id}(id=${control.getId()})}"
            hx-confirm="Are you sure you want to delete this control?"
            hx-target="body"
            hx-push-url="true">
      Delete control
    </button>
  </div>

  <div class="mt-4 mb-2 container"> <h3 th:text="${control.getName()}" class="mb-2"></h3> <div class="d-flex align-items-center flex-wrap gap-2">
    <a th:href="@{/topic/{id}(id = ${control.getTopic().getId()})}"
       class="btn btn-sm btn-dark text-nowrap"
       th:text="${control.getTopic().getCode()} + ' - ' + ${control.getTopic().getName()}"/>

    <span class="btn btn-sm btn-outline-danger disabled text-nowrap"
          style="opacity: 1; cursor: default;"
          th:text="'Cost Index: ' + ${control.getCostIndex()}">
    </span>
  </div>
  </div>
  <div class="container">
    <p th:text="${control.getDescription()}"/>
  </div>
  <hr>
  <div class="container">
    <h5>References</h5>
    <p th:if="${#lists.isEmpty(control.getReferences())}" class="text-muted italic">No references.</p>
    <p th:unless="${#lists.isEmpty(control.getReferences())}" th:each="reference: ${control.getReferences()}">
      <a th:href="${reference}" th:text="${reference}"/>
    </p>
  </div>
  <hr>
  <div class="container">
    <h5>MITRE ATT&CK Coverage</h5>
    <p th:if="${#lists.isEmpty(control.getTechniqueCoverage())}" class="text-muted italic">No technique coverage.</p>
    <div th:unless="${#lists.isEmpty(control.getTechniqueCoverage())}"
         class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 py-4">

      <div class="col" th:each="coverage, iterStat : ${control.getTechniqueCoverage()}">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column text-start">
            <h6 class="card-title fw-bold text-truncate my-1"
                th:title="${coverage.getTechnique().getDisplayLabel()}"
                th:text="${coverage.getTechnique().getDisplayLabel()}"/>

            <span class="badge badge-coverage-type font-monospace my-2 w-fit-content"
                  th:text="${coverage.getCoverageType()} + ': ' + ${coverage.getCoverageRating()}"
                  th:data-type="${coverage.getCoverageType()}"
            />

            <div class="mt-2">
              <button class="btn btn-link btn-sm p-0 text-decoration-none"
                      type="button"
                      data-bs-toggle="collapse"
                      th:attr="data-bs-target='#justification-' + ${iterStat.index}"
                      aria-expanded="false">
                View Justification ↓
              </button>
            </div>

            <div class="collapse mt-2" th:id="'justification-' + ${iterStat.index}">
              <div class="card-text small border-top pt-2 text-dark">
                <p th:text="${coverage.getJustification()}" class="mb-0" style="white-space: pre-wrap;"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <hr>
  <div class="container mt-5">
    <h5>Control Relationships</h5>
    <div th:replace="~{fragments/controlRelationship :: network(control=${control})}"></div>
  </div>
</div>
</body>
</html>
