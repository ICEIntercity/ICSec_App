<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: html}">
<head>
  <th:block th:with="pageTitle='Topics'"></th:block>
</head>
<body>
<div th:fragment="content">
  <h1>Topics</h1>
  <div class="container-fluid py-4">
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-6 g-4">

      <div class="col" th:each="topic : ${topics}">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column text-start">
            <div class="mb-2">
              <span class="badge bg-secondary font-monospace" th:text="${topic.getCode()}"/>
            </div>
            <h6 class="card-title fw-bold text-truncate" th:text="${topic.getName()}"/>
            <p class="card-text small text-muted text-description"
               th:text="${topic.getDescription()}"/>
            <div class="mt-auto">
              <a th:href="@{/topic/{id}( id = ${topic.getId()})}" class="btn btn-sm btn-outline-primary w-100">View Details</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
