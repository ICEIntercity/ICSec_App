<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: html}">
<head>
    <th:block th:with="pageTitle='Topics'"></th:block>
    <title>Topics</title>
</head>
<body>
<div th:fragment="content">
    <div class="container py-2">
      <a class="btn btn-dark mx-1" th:href="@{/topic/all}">< Back</a>
      <a class="btn btn-primary mx-1" th:href="@{/topic/edit/{id}(id=${topic.getId()})}">Edit topic</a>
    <button class="btn btn-danger mg"
            th:attr="hx-delete=@{/topic/delete/{id}(id=${topic.getId()})}"
            hx-confirm="Are you sure you want to delete this topic?"
            hx-target="body"
            hx-push-url="true">
        Delete topic
    </button>
    </div>
    <div id="message-container"></div>
      <div class="container py-4">
          <h1 th:text="${topic.getName()}"></h1> <span class="badge text-bg-secondary" th:text="${topic.getCode()}"></span>
          <hr>
          <p th:text="${topic.getDescription()}"/>
          </div>
      <div class="container">
          <h3>Defensive controls:</h3>
          <div th:replace="~{fragments/controlList :: controlGrid(controlList=${topic.getControls()})}"></div>
      </div>
</div>
</body>
</html>
