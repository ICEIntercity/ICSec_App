<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: html}">
<head>
  <th:block th:with="pageTitle='Topics'"></th:block>
</head>
<body>
<div th:fragment="content">
  <h1>Topics</h1>
  <div th:if="${param.deleted}" class="alert alert-primary">
    Topic deleted.
  </div>
  <a class="btn btn-success" th:href="@{/topic/new}">Add new topic</a>
  <div class="container-fluid py-4">
    <div th:each="topic : ${topics}" class="card my-3 shadow-sm">
      <div class="card-header">
        <span class="badge text-bg-danger" th:text="${topic.getCode()}"></span>
      </div>

      <div class="card-body d-flex justify-content-between align-items-center">

        <div class="flex-grow-1 me-3">
          <h5 class="card-title fw-bold" th:text="${topic.getName()}"/>
          <p class="card-text text-muted" th:text="${topic.getDescription()}"/>
          <a th:href="@{/topic/{id}(id=${topic.getId()})}" class="btn btn-sm btn-outline-secondary">Details</a>
        </div>

        <div class="text-end border-start ps-4" style="min-width: 120px;">
          <div class="display-4 fw-bold text-secondary-emphasis"
               th:text="${#lists.size(topic.getControls())}">0</div>
          <div class="small text-muted" style="letter-spacing: 1px;">Controls</div>
        </div>

      </div>
    </div>
  </div>
</div>
</body>
</html>
