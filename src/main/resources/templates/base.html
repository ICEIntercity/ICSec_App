<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${pageTitle ?: 'ICSec Framework Explorer'}">ICSec Framework Explorer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link th:href="@{/css/general.css}" rel="stylesheet">
    <link th:href="@{/css/cards.css}" rel="stylesheet">
    <link th:href="@{/css/badges.css}" rel="stylesheet">
    <link th:href="@{/css/relationships.css}" rel="stylesheet">
    <style>
        /* Ensures the footer stays at the bottom if content is short */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/nav :: navbar}"></header>

<main class="container d-flex p-3">
    <div class="row w-100">
        <div class="col-lg-12 mx-auto" th:insert="~{this :: content}">
            <p>Default content if nothing is provided.</p>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
<script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
</body>
</html>
