<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="aiLoadingTemplate" id="aiLoadingTemplate" style="display:none;">
    <div class="modal-content">
        <div class="modal-body text-center p-5">
            <div class="progress mb-3" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 100%"></div>
            </div>
            <p class="text-muted fw-bold">AI is assessing control coverage...</p>
        </div>
    </div>
</div>

<div th:fragment="coverageTable" class="modal-content">
    <div class="modal-header bg-light d-flex justify-content-between align-items-center">
        <h5 class="modal-title mb-0"><i class="bi bi-stars text-info"></i> AI Proposed Coverage</h5>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-sm btn-danger" data-bs-dismiss="modal">Reject AI output</button>
            <button type="button" class="btn btn-sm btn-primary" data-bs-dismiss="modal" onclick="acceptAITechniqueCoverage()">Accept AI output</button>
            <button type="button" class="btn-close ms-2" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
    </div>

    <div class="modal-body">
        <div id="aiProposedCoverageList">
            <div th:each="cov, iter : ${coverageList}">
                <div th:replace="~{fragments/techniqueCoverage :: techniqueCoverageRow(coverage=${cov}, index=${iter.index})}"></div>
            </div>
        </div>
    </div>

    <script>
        function acceptAITechniqueCoverage() {
            const sourceList = document.getElementById('aiProposedCoverageList');
            const targetList = document.getElementById('coverageList');

            if (sourceList && targetList) {
                // Replace main form contents
                targetList.innerHTML = sourceList.innerHTML;

                // Reprocess the new DOM elements with HTMX so any inline hx-* tags work correctly
                if (typeof htmx !== 'undefined') {
                    htmx.process(targetList);
                }
            }
        }
    </script>
</div>
</body>
</html>
