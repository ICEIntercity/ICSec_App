<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Loading Fragment -->
<div th:fragment="aiLoadingTemplate" id="aiLoadingTemplate" style="display:none;">
    <div class="modal-content">
        <div class="modal-body text-center p-5">
            <div class="progress mb-3" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 100%"></div>
            </div>
            <p class="text-muted fw-bold">AI is assessing control coverage...</p>
        </div>
    </div>
</div>

<!-- Results Fragment -->
<div th:fragment="coverageTable" class="modal-content">
    <div class="modal-header bg-light d-flex justify-content-between align-items-center">
        <h5 class="modal-title mb-0"><i class="bi bi-stars text-info"></i> AI Proposed Coverage</h5>
        <div class="d-flex gap-2">
            <!-- Reject button updated to btn-danger -->
            <button type="button" class="btn btn-sm btn-danger" data-bs-dismiss="modal">Reject AI output</button>
            <button type="button" class="btn btn-sm btn-primary" data-bs-dismiss="modal">Accept AI output</button>
            <button type="button" class="btn-close ms-2" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
    </div>

    <div class="modal-body">
        <div class="list-group">
            <div th:each="cov : ${coverageList}" class="list-group-item flex-column align-items-start p-3 mb-2 shadow-sm border">
                <h6 class="fw-bold text-primary mb-2" th:text="${cov.technique.mitreId} + ' - ' + ${cov.technique.name}"></h6>

                <!-- Badges moved ABOVE the justification -->
                <div class="d-flex gap-2 mb-2">
                    <span class="badge bg-secondary" th:text="${cov.coverageType.displayValue}"></span>
                    <span class="badge"
                          th:classappend="${cov.coverageRating <= 1 ? 'bg-danger' : (cov.coverageRating <= 3 ? 'bg-warning text-dark' : 'bg-success')}"
                          th:text="'Score: ' + ${cov.coverageRating}">
                    </span>
                </div>

                <p class="mb-1 small text-muted" style="font-style: italic;" th:text="${cov.justification}"></p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
