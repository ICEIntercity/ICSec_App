<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="controlRelationshipModal" id="controlRelationshipModalContent" tabindex="-1">
    <div class="modal-content">
        <div class="modal-header">
            <h1 class="modal-title fs-5" th:text="${index != null ? 'Edit Relationship' : 'Add Relationship'}"></h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <div class="mb-3">
                <label for="relType" class="form-label">Relationship Type</label>
                <select id="relType" name="type" class="form-control">
                    <option th:each="type : ${T(com.czintercity.icsec_app.relationships.controlRelationship.ControlRelationshipType).values()}"
                            th:if="${type != T(com.czintercity.icsec_app.relationships.controlRelationship.ControlRelationshipType).UNKNOWN}"
                            th:value="${type}"
                            th:text="${type.displayValue}"
                            th:selected="${type == controlRelationship.type}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label for="targetControl" class="form-label">Target Control</label>
                <select id="targetControl" name="targetId" class="form-control">
                    <option th:each="ctrl : ${controls}"
                            th:value="${ctrl.id}"
                            th:text="${ctrl.topic.code} + '-' + ${ctrl.displayId} + ' : ' + ${ctrl.name}"
                            th:selected="${controlRelationship.targetId != null && ctrl.id == controlRelationship.targetId}">
                    </option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button"
                    class="btn btn-primary"
                    th:hx-post="@{/controlRelationship/row}"
                    th:attr="hx-target=${index != null ? '#rel-outgoing-' + index : '#relationshipList'},
                             hx-swap=${index != null ? 'outerHTML' : 'beforeend'}"
                    hx-include="#targetControl, #relType"
                    th:hx-vals="|{&quot;index&quot;: ${index != null ? index : arrayLength}}|"
                    data-bs-dismiss="modal">
                Save Relationship
            </button>
        </div>
    </div>
</div>

<div th:fragment="controlRelationshipRow(controlRelationship, index, listName)"
     class="card my-2"
     th:id="'rel-outgoing-' + ${index}"
     th:attr="data-rel-type=${controlRelationship.type.name()}"> <div class="card-body">
    <div class="row align-items-center">
        <div class="col-md-10">
            <span class="rel-badge me-2" th:text="${controlRelationship.type.displayValue}"></span>

            <strong th:text="${controlRelationship.targetCode}"></strong>
            <span th:text="' - ' + ${controlRelationship.targetName}"></span>

            <input type="hidden" th:name="|${listName}[${index}].targetId|" th:value="${controlRelationship.targetId}"/>
            <input type="hidden" th:name="|${listName}[${index}].type|" th:value="${controlRelationship.type}"/>
        </div>

        <div class="col-md-2 text-end">
            <button type="button"
                    class="btn btn-outline-danger btn-sm"
                    th:hx-delete="@{/controlRelationship/row}"
                    th:hx-target="'#rel-outgoing-' + ${index}"
                    hx-swap="delete"
                    hx-confirm="Are you sure you want to remove this relationship?">
                Delete
            </button>
        </div>
    </div>
</div>
</div>
</body>
</html>
