<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="controlRelationshipModal" id="controlRelationshipModalContent" tabindex="-1">
    <div class="modal-content">
        <div class="modal-header">
            <h1 class="modal-title fs-5" th:text="${index != null ? 'Edit Relationship' : 'Add Relationship'}"></h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <div class="mb-3">
                <label for="relType" class="form-label">Relationship Type</label>
                <select id="relType" name="type" class="form-control">
                    <option th:each="type : ${T(com.czintercity.icsec_app.relationships.controlRelationship.ControlRelationshipType).values()}"
                            th:if="${type != T(com.czintercity.icsec_app.relationships.controlRelationship.ControlRelationshipType).UNKNOWN}"
                            th:value="${type}"
                            th:text="${type.displayValue}"
                            th:selected="${type == controlRelationship.type}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label for="targetControl" class="form-label">Target Control</label>
                <select id="targetControl" name="targetId" class="form-control">
                    <option th:each="ctrl : ${controls}"
                            th:value="${ctrl.id}"
                            th:text="${ctrl.topic.code} + '-' + ${ctrl.displayId} + ' : ' + ${ctrl.name}"
                            th:selected="${controlRelationship.targetId != null && ctrl.id == controlRelationship.targetId}">
                    </option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button"
                    class="btn btn-primary"
                    th:hx-post="@{/controlRelationship/row}"
                    th:attr="hx-target=${index != null ? '#rel-outgoing-' + index : '#relationshipList'},
                             hx-swap=${index != null ? 'outerHTML' : 'beforeend'}"
                    hx-include="#targetControl, #relType"
                    th:hx-vals="|{&quot;index&quot;: ${index != null ? index : arrayLength}}|"
                    data-bs-dismiss="modal">
                Save Relationship
            </button>
        </div>
    </div>
</div>

<div th:fragment="controlRelationshipRow(controlRelationship, index, listName)"
     class="card my-2"
     th:id="'rel-outgoing-' + ${index}"
     th:attr="data-rel-type=${controlRelationship.type.name()}"> <div class="card-body">
    <div class="row align-items-center">
        <div class="col-md-10">
            <span class="rel-badge me-2" th:text="${controlRelationship.type.displayValue}"></span>

            <strong th:text="${controlRelationship.targetCode}"></strong>
            <span th:text="' - ' + ${controlRelationship.targetName}"></span>

            <input type="hidden" th:name="|${listName}[${index}].targetId|" th:value="${controlRelationship.targetId}"/>
            <input type="hidden" th:name="|${listName}[${index}].type|" th:value="${controlRelationship.type}"/>
        </div>

        <div class="col-md-2 text-end">
            <button type="button"
                    class="btn btn-outline-danger btn-sm"
                    th:hx-delete="@{/controlRelationship/row}"
                    th:hx-target="'#rel-outgoing-' + ${index}"
                    hx-swap="delete"
                    hx-confirm="Are you sure you want to remove this relationship?">
                Delete
            </button>
        </div>
    </div>
</div>
</div>

<div th:fragment="network(control)">
    <div id="relationship-network" style="width: 100%; height: 400px; border: 1px solid #dee2e6; border-radius: 0.5rem; cursor: pointer;"></div>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script th:inline="javascript">
        // I hate myself for this, but it has to be done
        document.addEventListener('DOMContentLoaded', function () {
            const currentId = [[${control.id.toString()}]];

            // Helper to format labels
            function formatLabel(code, name) {
                return `<b>${code}</b>\n${name}`;
            }

            // A lot of ugly javascript to get the graph nodes
            const nodes = new vis.DataSet([{
                id: currentId,
                label: formatLabel([[${control.topic.code + '-' + control.displayId}]], [[${control.name}]]),
                color: {
                    background: '#212529',
                    border: '#000000',
                    highlight: { background: '#343a40', border: '#000000' }
                },
                font: { color: 'white', multi: 'html', align: 'center' },
                shape: 'box',
                margin: 10
            }]);

            const edges = new vis.DataSet();

            // More ugly JS to load the immediate relations
            // TODO: Update to allow for "exploding" nodes (maybe someday)
            const relations = [
                /*[# th:each="rel : ${control.outgoingRelationships}"]*/
                {
                    from: currentId,
                    to: [[${rel.target.id.toString()}]],
                    targetId: [[${rel.target.id.toString()}]],
                    targetName: [[${rel.target.name}]],
                    // Assuming target has these fields based on your modal logic
                    targetCode: [[${rel.target.topic.code + '-' + rel.target.displayId}]],
                    props: [[${rel.getGraphProperties(control)}]]
                },
                /*[/]*/
                /*[# th:each="rel : ${control.incomingRelationships}"]*/
                {
                    from: [[${rel.source.id.toString()}]],
                    to: currentId,
                    targetId: [[${rel.source.id.toString()}]],
                    targetName: [[${rel.source.name}]],
                    targetCode: [[${rel.source.topic.code + '-' + rel.source.displayId}]],
                    props: [[${rel.getGraphProperties(control)}]]
                }
                /*[/]*/
            ];

            // Node visuals for each vertex
            relations.forEach(r => {
                if (!nodes.get(r.targetId)) {
                    nodes.add({
                        id: r.targetId,
                        label: formatLabel(r.targetCode, r.targetName),
                        shape: 'box',
                        color: {
                            background: '#f8f9fa',
                            border: '#dee2e6'
                        },
                        font: { multi: 'html', align: 'center' },
                        margin: 10
                    });
                }

                // Visuals for edges
                edges.add({
                    from: r.from,
                    to: r.to,
                    label: r.props.label,
                    color: r.props.color,
                    dashes: r.props.dashes,
                    arrows: r.props.arrows,
                    font: {
                        size: 11,
                        strokeWidth: 0,
                        align: 'middle',
                        background: '#ffffff',
                        color: '#212529'
                    }
                });
            });

            // Adding the network
            const container = document.getElementById('relationship-network');
            const data = { nodes, edges };
            const options = {
                physics: { solver: 'forceAtlas2Based', stabilization: { iterations: 100 } },
                interaction: { hover: true }
            };

            const network = new vis.Network(container, data, options);

            // Link to related controls
            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    // Navigate to the control view page
                    window.location.href = `/control/${nodeId}`;
                }
            });

            // Change cursor to pointer on hover for eye candy
            network.on("hoverNode", () => container.style.cursor = 'pointer');
            network.on("blurNode", () => container.style.cursor = 'default');
        });
    </script>
</div>
</body>
</html>
