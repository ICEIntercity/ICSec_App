<html xmlns:th="http://www.thymeleaf.org" lang="en">
<div th:fragment="controlGrid(controlList)">
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-4">
        <div class="col" th:each="control : ${controlList}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column text-start">
                    <span class="badge bg-secondary font-monospace my-1" th:text="${control.getCode()}"></span>
                    <h6 class="card-title fw-bold text-truncate my-1" th:text="${control.getName()}"></h6>
                    <p class="card-text small text-muted text-description" th:text="${control.getDescription()}"></p>
                    <div class="my-1">
                        <span th:each="coverage : ${control.getTechniqueCoverage()}"
                              class="badge bg-danger font-monospace mx-1"
                              th:text="${coverage.getTechnique().getMitreId()}"></span>
                    </div>
                    <div class="mt-auto">
                        <hr>
                        <a th:href="@{/control/{id}(id = ${control.getId()})}"
                           class="btn btn-sm btn-outline-primary w-100">View Details</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
