<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="techniqueCoverageModal" class="modal-body" id="techniqueCoverageModalContent">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" th:text="${index != null ? 'Edit Technique Coverage' : 'Add Technique Coverage'}"></h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="targetTechnique" class="form-label">Target Technique</label>
                    <select id="targetTechnique" class="form-control" th:field="*{techniqueCoverage.technique}">
                        <option th:each="technique : ${techniques}"
                                th:value="${technique.id}"
                                th:text="${technique.mitreId} + ' - ' + ${technique.name}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="coverageType" class="form-label">Coverage Type</label>
                    <select id="coverageType" class="form-control" th:field="*{techniqueCoverage.coverageType}">
                        <option th:each="coverageType : ${T(com.czintercity.icsec_app.relationships.techniqueCoverage.CoverageType).values()}"
                                th:value="${coverageType}" th:text="${coverageType.displayValue}"/>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="coverageRating" class="form-label">Coverage Rating (0-5)</label>
                    <input th:field="*{techniqueCoverage.coverageRating}" type="range" class="form-range" min="0" max="5" step="1" id="coverageRating">
                    <output for="coverageRating" id="coverageRatingValue" th:text="*{techniqueCoverage.coverageRating}"></output>
                </div>
                <div class="mb-3">
                    <label for="coverageJustification" class="form-label">Justification</label>
                    <textarea id="coverageJustification" class="form-control" th:field="*{techniqueCoverage.justification}"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button"
                        class="btn btn-primary"
                        th:hx-post="@{/techniqueCoverage/row}"
                        th:attr="hx-target=${index != null ? '#coverage-' + index : '#coverageList'},
                                 hx-swap=${index != null ? 'outerHTML' : 'beforeend'}"
                        hx-include="#targetTechnique, #coverageType, #coverageRating, #coverageJustification"
                        th:hx-vals="${index != null ? '{&quot;index&quot;: ' + index + '}' : '{&quot;index&quot;: ' + arrayLength + '}'}"
                        data-bs-dismiss="modal">
                    Save changes
                </button>
            </div>
        </div>
    <script>
        (function() {
            const rangeInput = document.getElementById('coverageRating');
            const rangeOutput = document.getElementById('coverageRatingValue');
            rangeInput.addEventListener('input', function() {
                rangeOutput.textContent = this.value;
            });
        })();
    </script>
</div>

<div th:fragment="techniqueCoverageRow(coverage, index)" class="card my-2" th:id="'coverage-' + ${index}">
    <div class="card-header bg-dark text-light d-flex justify-content-between align-items-center">
        <h6 class="mb-0" th:text="${coverage.technique.mitreId} + ' - ' + ${coverage.technique.name}"/>
        <input type="hidden" th:name="|defaultTechniqueCoverage[${index}].technique|" th:value="${coverage.technique.id}"/>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-2">
                <strong>Rating:</strong>
                <p th:text="${coverage.coverageRating}"/>
                <input type="hidden" th:name="|defaultTechniqueCoverage[${index}].coverageRating|" th:value="${coverage.coverageRating}"/>
            </div>
            <div class="col-md-2">
                <strong>Type:</strong>
                <p th:text="${coverage.coverageType.displayValue}"/>
                <input type="hidden" th:name="|defaultTechniqueCoverage[${index}].coverageType|" th:value="${coverage.coverageType}"/>
            </div>
            <div class="col-md-6">
                <strong>Justification:</strong>
                <p th:text="${coverage.justification}"/>
                <input type="hidden" th:name="|defaultTechniqueCoverage[${index}].justification|" th:value="${coverage.justification}"/>
            </div>
            <div class="col-md-2 text-end">
                <button type="button"
                        th:hx-get="@{/techniqueCoverage/edit}"
                        hx-target="#modalHolder"
                        th:hx-vals="'{&quot;index&quot;: ' + ${index} +
                                   ', &quot;technique&quot;: &quot;' + ${coverage.technique.id} + '&quot;' +
                                   ', &quot;coverageType&quot;: &quot;' + ${coverage.coverageType} + '&quot;' +
                                   ', &quot;coverageRating&quot;: ' + ${coverage.coverageRating} +
                                   ', &quot;justification&quot;: &quot;' + ${coverage.justification} + '&quot;}'"
                        class="btn btn-outline-secondary btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#formModal">
                    Edit
                </button>

                <button type="button"
                        th:hx-delete="@{/techniqueCoverage/row}"
                        th:hx-target="'#coverage-' + ${index}"
                        hx-swap="delete"
                        hx-confirm="Are you sure you want to remove this coverage?"
                        class="btn btn-outline-danger btn-sm">
                    Delete
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
